<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | Kalkidan</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
</head>
<body>
  <main class="container">
    <div class="contact-wrap reveal">
      <p class="section-label" style="justify-content:flex-start;">Get in touch</p>
      <h1>Let's <span style="color:var(--violet-light)">Talk.</span></h1>
      <p class="subtitle">Open to data analyst, ML, and analytics engineering roles. Drop a message below.</p>

      <form class="contact" action="mailto:gebkalkidan@gmail.com" method="POST" enctype="text/plain">
        <div class="field">
          <label for="email">Your Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" required placeholder="Let's connect">
        </div>
        <div class="field">
          <label for="body">Message</label>
          <textarea id="body" name="body" rows="5" required placeholder="What's on your mind?"></textarea>
        </div>
        <button type="submit">Send Message →</button>
      </form>

      <div class="contact-links">
        <a href="mailto:gebkalkidan@gmail.com">✉ gebkalkidan@gmail.com</a>
        <a href="https://www.linkedin.com/in/kalkidangebrekirstos" target="_blank" rel="noopener">in LinkedIn</a>
        <a href="https://github.com/Kalberhe" target="_blank" rel="noopener">⌥ GitHub</a>
        <a href="../resume/">↗ Resume</a>
      </div>
    </div>
  </main>
</body>
</html>
